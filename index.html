<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Anime Shop</title>
  <link rel="stylesheet" href="style.css">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">
</head>
<body>

<section class="shop-section">
  <h1>ANIME SHOP</h1>

  <button class="shop-btn" id="shopButton">View Products</button>

  <div id="products" class="products hidden">

    <div class="product">
      <img src="https://via.placeholder.com/200x200" alt="Phone Case">
      <h3>Anime Phone Case</h3>
      <p>Stylish protective case</p>
      <span class="price">19.99€</span>
    </div>

    <div class="product">
      <img src="https://via.placeholder.com/200x200" alt="Figure">
      <h3>Anime Figure</h3>
      <p>High quality collectible</p>
      <span class="price">49.99€</span>
    </div>

    <div class="product">
      <img src="https://via.placeholder.com/200x200" alt="Limited">
      <h3>Limited Edition Item</h3>
      <p>Only 100 pieces worldwide</p>
      <span class="price">99.99€</span>
    </div>

  </div>
</section>

<script src="script.js"></script>
</body>
</html>
