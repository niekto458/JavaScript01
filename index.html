<!-- SHOP SECTION -->
<section class="shop-section">
  <h1>SHOP</h1>

  <button class="shop-btn" onclick="toggleShop()">View Products</button>

  <div id="products" class="products hidden">
    <div class="product">
      <h3>Product 1</h3>
      <p>Anime phone case</p>
    </div>

    <div class="product">
      <h3>Product 2</h3>
      <p>Anime figure</p>
    </div>

    <div class="product">
      <h3>Product 3</h3>
      <p>Limited edition item</p>
    </div>
  </div>
</section>
<script>
  function toggleShop() {
    const products = document.getElementById("products");
    products.classList.toggle("hidden");
  }
</script>

</body>
</html>
