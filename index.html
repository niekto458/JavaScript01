<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>NIKE STORE</title>
  <link rel="stylesheet" href="style.css">
</head>


<body>

<header>
  <h1 class="logo">NIKE</h1>
</header>

<section class="hero">
  <h2>JUST DO IT.</h2>
  <p>Discover the newest collection.</p>
  <button onclick="toggleShop()">SHOP NOW</button>
</section>

<section id="shop" class="shop hidden">

  <h2>SHOP</h2>

  <div class="products">

    <div class="product">
      <img src="https://picsum.photos/300?1">
      <h3>Nike Air</h3>
      <p>$120</p>
    </div>

    <div class="product">
      <img src="https://picsum.photos/300?2">
      <h3>Nike Runner</h3>
      <p>$95</p>
    </div>

    <div class="product">
      <img src="https://picsum.photos/300?3">
      <h3>Nike Street</h3>
      <p>$110</p>
    </div>

  </div>

</section>

<script src="script.js"></script>

</body>
</html>
